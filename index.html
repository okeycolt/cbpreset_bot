<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preset Shop</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

    <h2 class="main-title">Твои Пресеты & Сведение</h2>

    <div class="glass-card">
        <div class="card-header">
            <div class="title">Vocal Preset: "Pro Silver"</div>
            <div class="price">499 ₴ / 15 USDT</div>
        </div>
        
        <button class="details-btn" onclick="togglePlugins('plugins1')">Показать плагины</button>
        
        <div id="plugins1" class="plugin-list">
            <div class="plugin-item">✓ FabFilter Pro-Q 3</div>
            <div class="plugin-item">✓ Waves CLA-76</div>
            <div class="plugin-item">✓ iZotope Nectar 3</div>
            <div class="plugin-item">✓ Valhalla VintageVerb</div>
        </div>
        
        <button class="buy-btn" onclick="buy()">Купить сейчас</button>
    </div>

    <div class="glass-card">
        <div class="card-header">
            <div class="title">Полное сведение & Мастеринг</div>
            <div class="price">1500 ₴ / 40 USDT</div>
        </div>

        <button class="details-btn" onclick="togglePlugins('plugins2')">Что входит?</button>
        
        <div id="plugins2" class="plugin-list">
            <div class="plugin-item">✓ Коррекция (Autotune/Melodyne)</div>
            <div class="plugin-item">✓ Эквализация и динамика</div>
            <div class="plugin-item">✓ Мастеринг под площадки</div>
        </div>
        
        <button class="buy-btn" onclick="buy()">Заказать</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function togglePlugins(id) {
            let list = document.getElementById(id);
            // Плавное переключение через JS
            if (list.style.display === 'block') {
                list.style.display = 'none';
            } else {
                list.style.display = 'block';
            }
        }

        function buy() {
            // В будущем здесь будет логика оплаты
            tg.MainButton.setText("Переход к оплате...");
            tg.MainButton.show();
        }
    </script>
</body>
</html>
